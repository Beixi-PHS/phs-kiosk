<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pelvic Health Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #2A435F;
      --white: #ffffff;
      --radius: 14px;
      --ease:   cubic-bezier(0.16, 1, 0.3, 1);
    }

    html, body {
      height: 100%;
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 15% 80%, rgba(61,90,122,0.5) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(42,67,95,0.7) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── Screens ──────────────────────────────────────────────────────────── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 56px;
      opacity: 0; transform: translateY(20px);
      pointer-events: none;
      transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
    }
    .screen.active { opacity: 1; transform: translateY(0); pointer-events: all; }
    .screen.exit   { opacity: 0; transform: translateY(-20px); pointer-events: none; }

    /* ── Brand ────────────────────────────────────────────────────────────── */
    .brand {
      position: fixed; top: 32px; left: 0; right: 0;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px; font-weight: 300;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.38);
    }

    /* ── Typography ───────────────────────────────────────────────────────── */
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4.5vw, 46px);
      font-weight: 300; text-align: center; line-height: 1.15;
      margin-bottom: 6px;
    }
    .page-sub {
      font-size: 13px; font-weight: 300;
      color: rgba(255,255,255,0.4);
      text-align: center; letter-spacing: 0.05em;
      margin-bottom: 36px;
    }
    .section-label {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      align-self: flex-start;
      margin-bottom: 12px;
      width: 100%; max-width: 760px;
    }

    /* ── Location grid ────────────────────────────────────────────────────── */
    .location-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      width: 100%; max-width: 560px;
      margin-bottom: 0;
    }

    .location-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      padding: 22px 16px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 300;
      text-align: center; cursor: pointer;
      transition: all 0.18s ease;
      line-height: 1.3;
    }
    .location-btn:active { transform: scale(0.95); }
    .location-btn.selected {
      background: var(--white);
      color: var(--navy);
      border-color: var(--white);
      font-weight: 500;
    }

    /* ── Therapist grid ───────────────────────────────────────────────────── */
    .therapist-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: 100%; max-width: 760px;
      margin-bottom: 0;
    }

    /* Fewer therapists → fewer columns */
    .therapist-grid.cols-2 { grid-template-columns: repeat(2, 1fr); max-width: 420px; }
    .therapist-grid.cols-3 { grid-template-columns: repeat(3, 1fr); max-width: 580px; }
    .therapist-grid.cols-5 { grid-template-columns: repeat(5, 1fr); max-width: 900px; }

    .therapist-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      padding: 16px 10px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 300;
      text-align: center; cursor: pointer;
      transition: all 0.18s ease;
      line-height: 1.3;
      min-height: 54px;
      display: flex; align-items: center; justify-content: center;
    }
    .therapist-btn:active { transform: scale(0.95); }
    .therapist-btn.selected {
      background: var(--white);
      color: var(--navy);
      border-color: var(--white);
      font-weight: 500;
    }

    /* ── Stars ────────────────────────────────────────────────────────────── */
    .stars-row {
      display: flex; align-items: center;
      gap: 8px; margin-bottom: 6px;
    }
    .star {
      font-size: clamp(40px, 7vw, 58px);
      cursor: pointer;
      color: rgba(255,255,255,0.13);
      transition: color 0.12s ease, transform 0.12s ease;
      line-height: 1;
    }
    .star.lit   { color: var(--white); }
    .star.hover { transform: scale(1.1); }
    .star:active { transform: scale(0.9); }

    .rating-label {
      font-size: 13px; font-weight: 300;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      height: 18px; margin-bottom: 24px;
      text-align: center; width: 100%; max-width: 760px;
    }

    /* ── Main screen layout ───────────────────────────────────────────────── */
    #screen-main {
      padding-top: 72px;
      justify-content: flex-start;
      gap: 0;
    }

    /* ── Submit ───────────────────────────────────────────────────────────── */
    .submit-btn {
      background: var(--white); color: var(--navy);
      border: none; padding: 18px 60px;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500;
      letter-spacing: 0.06em; cursor: pointer;
      transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
      opacity: 0; pointer-events: none;
      transform: translateY(6px);
    }
    .submit-btn.visible { opacity: 1; pointer-events: all; transform: translateY(0); }
    .submit-btn:active  { transform: scale(0.96); }

    .error-msg {
      font-size: 12px; color: rgba(255,160,160,0.8);
      text-align: center; margin-top: 10px; height: 16px;
    }

    /* ── Divider between sections on main screen ──────────────────────────── */
    .section-divider {
      width: 100%; max-width: 760px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 24px 0 28px;
    }

    /* ── Thank you ────────────────────────────────────────────────────────── */
    .thank-icon {
      font-size: 56px; margin-bottom: 20px;
      animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes pop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .thank-headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(40px,6vw,60px); font-weight: 300;
      margin-bottom: 10px;
    }
    .thank-sub {
      font-size: 15px; font-weight: 300;
      color: rgba(255,255,255,0.5); margin-bottom: 48px;
    }
    .countdown-ring { width: 60px; height: 60px; position: relative; }
    .countdown-ring svg { transform: rotate(-90deg); }
    .countdown-ring circle { fill: none; stroke: rgba(255,255,255,0.13); stroke-width: 2; }
    .countdown-ring .progress {
      stroke: rgba(255,255,255,0.55);
      stroke-dasharray: 175.9; stroke-dashoffset: 0;
      stroke-linecap: round; transition: stroke-dashoffset 1s linear;
    }
    .countdown-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 300; color: rgba(255,255,255,0.55);
    }
  </style>
</head>
<body>

  <div class="brand">Pelvic Health Solutions</div>

  <!-- ── Main screen ────────────────────────────────────────────────────── -->
  <div class="screen active" id="screen-main">

    <div class="page-title">How was your visit today?</div>
    <div class="page-sub">Select your location, therapist, and rating — takes seconds.</div>

    <!-- Location -->
    <div class="section-label">Your location</div>
    <div class="location-grid" id="location-grid"></div>

    <div class="section-divider" id="divider-therapist" style="opacity:0"></div>

    <!-- Therapist (shown after location selected) -->
    <div class="section-label" id="label-therapist" style="opacity:0">Your therapist</div>
    <div class="therapist-grid" id="therapist-grid"></div>

    <div class="section-divider" id="divider-stars" style="opacity:0"></div>

    <!-- Stars (always visible) -->
    <div class="section-label" id="label-stars" style="opacity:0">Your experience</div>
    <div class="stars-row" id="stars">
      <span class="star" data-val="1">★</span>
      <span class="star" data-val="2">★</span>
      <span class="star" data-val="3">★</span>
      <span class="star" data-val="4">★</span>
      <span class="star" data-val="5">★</span>
    </div>
    <div class="rating-label" id="rating-label" style="opacity:0"></div>

    <button class="submit-btn" id="submit-btn" onclick="submitFeedback()">
      Submit Feedback
    </button>
    <div class="error-msg" id="error-msg"></div>

  </div>

  <!-- ── Thank you screen ───────────────────────────────────────────────── -->
  <div class="screen" id="screen-thanks">
    <div class="thank-icon">✦</div>
    <div class="thank-headline">Thank you.</div>
    <div class="thank-sub">Your feedback means a great deal to us.</div>
    <div class="countdown-ring">
      <svg viewBox="0 0 60 60" width="60" height="60">
        <circle cx="30" cy="30" r="28"/>
        <circle class="progress" id="countdown-circle" cx="30" cy="30" r="28"/>
      </svg>
      <div class="countdown-num" id="countdown-num">5</div>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════════════════════════════════════
    // THERAPISTS BY LOCATION — update names here
    // ══════════════════════════════════════════════════════════════════════
    const LOCATIONS = {
      "Palm Beach Gardens": [
        "Sarah Christian",
        "Marissa Miller",
        "Taylor De Oro",
        "Alexandria Hencely",
        "Andrea Bucaro"
      ],
      "Stuart": [
        "Tiffany Grigsby",
        "Christy Jackson",
        "Jeannine Dunnell"
      ],
      "Boca Raton": [
        "Jolene Winn",
        "Andrea Bucaro",
        "Shula Hochster"
      ],
      "Pembroke Pines": [
        "Claudia Lloyd",
        "Marisol Martinez"
      ]
    };
    // ══════════════════════════════════════════════════════════════════════

    const RATING_LABELS = { 1:"Poor", 2:"Fair", 3:"Good", 4:"Very Good", 5:"Excellent" };

    let selectedLocation  = null;
    let selectedTherapist = null;
    let selectedRating    = null;
    let countdownTimer    = null;

    // ── Build location buttons ────────────────────────────────────────────
    const locationGrid = document.getElementById('location-grid');
    Object.keys(LOCATIONS).forEach(loc => {
      const btn       = document.createElement('button');
      btn.className   = 'location-btn';
      btn.textContent = loc;
      btn.onclick     = () => selectLocation(loc, btn);
      locationGrid.appendChild(btn);
    });

    // ── Location selection ────────────────────────────────────────────────
    function selectLocation(loc, btn) {
      selectedLocation  = loc;
      selectedTherapist = null;
      selectedRating    = null;

      // Highlight selected location
      document.querySelectorAll('.location-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');

      // Build therapist grid for this location
      buildTherapistGrid(LOCATIONS[loc]);

      // Reveal therapist section
      fadeIn('divider-therapist');
      fadeIn('label-therapist');
      fadeIn('divider-stars');
      fadeIn('label-stars');
      fadeIn('rating-label');

      // Reset downstream
      renderStars(null);
      document.getElementById('submit-btn').classList.remove('visible');
      clearError();
    }

    // ── Build therapist grid ──────────────────────────────────────────────
    function buildTherapistGrid(therapists) {
      const grid      = document.getElementById('therapist-grid');
      grid.innerHTML  = '';

      // Auto column count based on number of therapists
      const cols = therapists.length <= 2 ? 'cols-2'
                 : therapists.length === 3 ? 'cols-3'
                 : therapists.length === 5 ? 'cols-5'
                 : therapists.length <= 6  ? 'cols-3'
                 : '';
      grid.className = `therapist-grid ${cols}`;

      therapists.forEach(name => {
        const btn     = document.createElement('button');
        btn.className = 'therapist-btn';
        btn.textContent = name;
        btn.onclick   = () => selectTherapist(name, btn);
        grid.appendChild(btn);
      });
    }

    // ── Therapist selection ───────────────────────────────────────────────
    function selectTherapist(name, btn) {
      selectedTherapist = name;
      document.querySelectorAll('.therapist-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      clearError();
      maybeShowSubmit();
    }

    // ── Star interactions ─────────────────────────────────────────────────
    const stars = document.querySelectorAll('.star');
    stars.forEach(star => {
      star.addEventListener('touchstart', e => {
        e.preventDefault();
        selectRating(parseInt(star.dataset.val));
      }, { passive: false });
      star.addEventListener('click', () => selectRating(parseInt(star.dataset.val)));
      star.addEventListener('mouseenter', () => lightStars(parseInt(star.dataset.val)));
      star.addEventListener('mouseleave', () => renderStars(selectedRating));
    });

    function lightStars(val) {
      stars.forEach(s => {
        const sv = parseInt(s.dataset.val);
        s.classList.toggle('lit',   sv <= val);
        s.classList.toggle('hover', sv === val);
      });
      document.getElementById('rating-label').textContent = RATING_LABELS[val] || '';
    }

    function renderStars(val) {
      stars.forEach(s => {
        s.classList.toggle('lit', !!val && parseInt(s.dataset.val) <= val);
        s.classList.remove('hover');
      });
      document.getElementById('rating-label').textContent = val ? RATING_LABELS[val] : '';
    }

    function selectRating(val) {
      selectedRating = val;
      renderStars(val);
      clearError();
      maybeShowSubmit();
    }

    function maybeShowSubmit() {
      if (selectedLocation && selectedTherapist && selectedRating) {
        document.getElementById('submit-btn').classList.add('visible');
      }
    }

    // ── Submit ────────────────────────────────────────────────────────────
    async function submitFeedback() {
      if (!selectedLocation || !selectedTherapist || !selectedRating) {
        document.getElementById('error-msg').textContent =
          !selectedLocation  ? 'Please select your location.' :
          !selectedTherapist ? 'Please select your therapist.' :
                               'Please select a rating.';
        return;
      }

      try {
        await fetch('/submit', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            location:  selectedLocation,
            therapist: selectedTherapist,
            rating:    selectedRating,
            timestamp: new Date().toISOString()
          })
        });
      } catch (e) {
        console.warn('Submit error (non-blocking):', e);
      }

      goTo('screen-thanks');
      startCountdown();
    }

    // ── Helpers ───────────────────────────────────────────────────────────
    function fadeIn(id) {
      document.getElementById(id).style.opacity = '1';
      document.getElementById(id).style.transition = 'opacity 0.3s ease';
    }

    function clearError() {
      document.getElementById('error-msg').textContent = '';
    }

    function goTo(id) {
      document.querySelectorAll('.screen').forEach(s => {
        if (s.classList.contains('active')) {
          s.classList.add('exit');
          s.classList.remove('active');
          setTimeout(() => s.classList.remove('exit'), 400);
        }
      });
      setTimeout(() => document.getElementById(id).classList.add('active'), 80);
    }

    function startCountdown() {
      const circle = document.getElementById('countdown-circle');
      const numEl  = document.getElementById('countdown-num');
      const circ   = 175.9;
      let count    = 5;

      circle.style.strokeDashoffset = '0';
      numEl.textContent = count;
      clearInterval(countdownTimer);

      countdownTimer = setInterval(() => {
        count--;
        numEl.textContent = count;
        circle.style.strokeDashoffset = circ * (1 - count / 5);
        if (count <= 0) { clearInterval(countdownTimer); resetApp(); }
      }, 1000);
    }

    function resetApp() {
      selectedLocation  = null;
      selectedTherapist = null;
      selectedRating    = null;

      document.querySelectorAll('.location-btn, .therapist-btn')
              .forEach(b => b.classList.remove('selected'));
      document.getElementById('therapist-grid').innerHTML = '';
      renderStars(null);

      // Hide therapist/stars sections again
      ['divider-therapist','label-therapist','divider-stars',
       'label-stars','rating-label'].forEach(id => {
        document.getElementById(id).style.opacity = '0';
      });

      document.getElementById('submit-btn').classList.remove('visible');
      document.getElementById('error-msg').textContent = '';

      goTo('screen-main');
    }
  </script>
</body>
</html>
